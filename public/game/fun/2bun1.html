<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport"content="width=device-width, initial-scale=1.0"><title>1/2 生存ゲーム(Nemmi Edition)</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>:root{--p:#3ecf8e;--d:#ff453a;--bg:#121212;--card:#1e1e1e}body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:var(--bg);color:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0}.container{background:var(--card);padding:2rem;border-radius:20px;box-shadow:0 10px 40px rgba(0,0,0,0.5);text-align:center;width:90%;max-width:400px;border:1px solid#333}h1{font-size:1.5rem;margin-bottom:0.5rem;color:var(--p)}.prob{font-size:2.2rem;font-weight:bold;margin:20px 0;color:#fff;text-shadow:0 0 10px rgba(62,207,142,0.3)}.screen{display:none}.active{display:block}button{background:var(--p);color:#000;border:none;padding:15px;border-radius:10px;cursor:pointer;width:100%;margin:8px 0;font-size:1.1rem;font-weight:bold;transition:0.2s}button:hover{transform:translateY(-2px);opacity:0.9}button:disabled{background:#555;color:#888;cursor:not-allowed;transform:none}button.secondary{background:#333;color:#ccc}table{width:100%;margin-top:20px;border-collapse:collapse}th,td{padding:10px;border-bottom:1px solid#333;text-align:center}th{color:var(--p);font-size:0.8rem}.rank-badge{font-weight:bold;color:var(--p)}input{width:100%;padding:12px;margin:15px 0;background:#2a2a2a;border:1px solid#444;color:white;border-radius:8px;box-sizing:border-box;text-align:center;font-size:1rem}.status{font-size:0.9rem;color:#888;margin-top:10px}.must-register{color:var(--d);font-size:0.8rem;margin-top:-10px;margin-bottom:10px;font-weight:bold}</style></head><body><div class="container"><!--スタート--><div id="screen-start"class="screen active"><h1>二分の一生存ゲーム</h1><p>1/2をどこまで当て続けられるか？</p><button onclick="startGame()">ゲーム開始</button><button class="secondary"onclick="showRanking()">ランキングを見る</button></div><!--ゲーム--><div id="screen-game"class="screen"><div id="streak-count"style="color: #888;">0回成功</div><div class="prob"id="prob-display">1/1</div><p>次はどっち？</p><div style="display:flex; gap:10px;"><button onclick="choice('left')">左</button><button onclick="choice('right')">右</button></div></div><!--結果--><div id="screen-result"class="screen"><h2 style="color:var(--d)">GAME OVER</h2><div id="final-stats"></div><!--ランクイン時：登録フォーム--><div id="rank-in-section"style="display:none;"><p style="color:var(--p); font-weight:bold; margin-top:20px; font-size: 1.2rem;">TOP10ランクイン！</p><p class="must-register">※名前を登録するまで次へ進めません</p><input type="text"id="player-name"placeholder="名前を入力してください"maxlength="10"><button id="save-btn"onclick="saveScore()">ランキングに名前を刻む</button></div><!--非ランクイン時、または登録後のみ表示--><div id="result-back-title"style="display:none;"><button class="secondary"style="margin-top:20px;"onclick="resetToTitle()">タイトルへ戻る</button></div></div><!--ランキング--><div id="screen-ranking"class="screen"><h3>世界TOP 10</h3><table id="ranking-table"></table><div id="loading"class="status">通信中...</div><button class="secondary"style="margin-top:20px;"onclick="showScreen('start')">戻る</button></div></div><script>const SUPABASE_URL="https://dpkctspxzyibymqfdivc.supabase.co";const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRwa2N0c3B4enlpYnltcWZkaXZjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0MzgzMDEsImV4cCI6MjA5MjAxNDMwMX0.OWZ1SolevofFyt-udDzPUcaWlZgptH6oHn0KP9gKpJE";const _supabase=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);let streak=0;let topScores=[];function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById('screen-'+id).classList.add('active')}function resetToTitle(){streak=0;document.getElementById('player-name').value="";document.getElementById('rank-in-section').style.display='none';document.getElementById('result-back-title').style.display='none';const saveBtn=document.getElementById('save-btn');saveBtn.disabled=false;saveBtn.innerText="ランキングに名前を刻む";showScreen('start')}async function startGame(){streak=0;updateUI();showScreen('game');fetchRankingData()}function updateUI(){document.getElementById('streak-count').innerText=`${streak}回成功`;let val=Math.pow(2,streak);let displayVal=val>1e12?val.toExponential(2):val.toLocaleString();document.getElementById('prob-display').innerText=`1 / ${displayVal}`}function choice(userChoice){const cpuChoice=Math.random()<0.5?'left':'right';if(userChoice===cpuChoice){streak++;updateUI()}else{endGame()}}async function endGame(){let val=Math.pow(2,streak);let displayVal=val>1e12?val.toExponential(2):val.toLocaleString();document.getElementById('final-stats').innerHTML=`<h3>${streak}回連続成功！</h3><p>(1/${displayVal} を突破)</p>`;const data=await fetchRankingData();const isTop=streak>0&&(data.length<10||streak>(data[data.length-1]?.score||0));if(isTop){document.getElementById('rank-in-section').style.display='block';document.getElementById('result-back-title').style.display='none'}else{document.getElementById('rank-in-section').style.display='none';document.getElementById('result-back-title').style.display='block'}showScreen('result')}async function fetchRankingData(){const{data,error}=await _supabase.from('Ranking-nemmi').select('name, score').order('score',{ascending:false}).limit(10);if(!error)topScores=data;return data||[]}async function saveScore(){const nameInput=document.getElementById('player-name');const name=nameInput.value.trim();if(!name){alert("ランキングに載せる名前を書いてください！");return}const saveBtn=document.getElementById('save-btn');saveBtn.disabled=true;saveBtn.innerText="刻み込み中...";const{error}=await _supabase.from('Ranking-nemmi').insert([{name:name,score:streak}]);if(error){alert("登録に失敗しました。");saveBtn.disabled=false}else{showRanking()}}async function showRanking(){showScreen('ranking');const table=document.getElementById('ranking-table');const loading=document.getElementById('loading');table.innerHTML="";loading.style.display="block";const data=await fetchRankingData();loading.style.display="none";if(data&&data.length>0){let html="<tr><th>順位</th><th>名前</th><th>成功数</th></tr>";let currentRank=1;data.forEach((row,i)=>{if(i>0&&row.score<data[i-1].score)currentRank=i+1;html+=`<tr><td class="rank-badge">${currentRank}位</td><td>${escapeHtml(row.name)}</td><td>${row.score}回</td></tr>`});table.innerHTML=html}else{table.innerHTML="<tr><td colspan='3'>まだ記録がありません</td></tr>"}}function escapeHtml(str){if(!str)return"";return str.replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}fetchRankingData();</script></body></html>
