<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>YouTube</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #212121;
      --surface-hover: #3f3f3f;
      --card: #272727;
      --text: #f1f1f1;
      --text-muted: #aaaaaa;
      --text-secondary: #717171;
      --accent: #ff0000;
      --border: #3f3f3f;
      --chip-bg: #272727;
      --chip-hover: #3f3f3f;
      --chip-active-bg: #f1f1f1;
      --chip-active-text: #0f0f0f;
      --header-height: 56px;
      --sidebar-width: 240px;
      --sidebar-collapsed: 72px;
      --ripple-color: rgba(255, 255, 255, 0.3);
      --skeleton-bg: #272727;
      --skeleton-shine: rgba(255, 255, 255, 0.05);
    }
    body.light-mode {
      --bg: #ffffff;
      --surface: #f2f2f2;
      --surface-hover: #e5e5e5;
      --card: #f8f8f8;
      --text: #0f0f0f;
      --text-muted: #606060;
      --text-secondary: #909090;
      --border: #e0e0e0;
      --chip-bg: #f2f2f2;
      --chip-hover: #e5e5e5;
      --chip-active-bg: #0f0f0f;
      --chip-active-text: #ffffff;
      --ripple-color: rgba(0, 0, 0, 0.15);
      --skeleton-bg: #e5e5e5;
      --skeleton-shine: rgba(255, 255, 255, 0.5);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Roboto', Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      overflow-y: scroll;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--text-secondary); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* Material Ripple */
    .ripple-wrapper {
      position: relative;
      overflow: hidden;
    }
    .ripple {
      position: absolute;
      border-radius: 50%;
      transform: scale(0);
      animation: ripple-anim 600ms linear;
      background-color: var(--ripple-color);
      pointer-events: none;
    }
    @keyframes ripple-anim {
      to { transform: scale(4); opacity: 0; }
    }

    /* Tooltip */
    [data-tooltip] {
      position: relative;
    }
    [data-tooltip]::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: -30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(97, 97, 97, 0.9);
      color: white;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      z-index: 10000;
      font-family: 'Roboto', sans-serif;
    }
    [data-tooltip]:hover::after { opacity: 1; transition-delay: 0.4s; }

    /* ===== HEADER ===== */
    header {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--header-height);
      background: var(--bg);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px;
      z-index: 1000;
    }

    .header-left { display: flex; align-items: center; gap: 16px; }
    .menu-btn {
      background: none; border: none; color: var(--text);
      width: 40px; height: 40px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      transition: background 0.2s;
    }
    .menu-btn:hover { background: var(--surface-hover); }

    .logo {
      display: flex; align-items: center; gap: 4px;
      text-decoration: none; color: var(--text);
      position: relative;
    }
    .logo-icon {
      width: 30px; height: 20px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-icon svg { width: 100%; height: 100%; }
    .logo-text {
      font-size: 20px; font-weight: 700; letter-spacing: -1px;
      font-family: 'YouTube Sans', 'Roboto', sans-serif;
    }
    .logo-sub { 
      font-size: 10px; color: var(--text-muted); font-weight: 400; 
      position: absolute; top: -2px; right: -24px;
    }

    /* Search */
    .header-center {
      flex: 1; display: flex; align-items: center;
      justify-content: center; gap: 8px; max-width: 728px; margin: 0 40px;
    }
    .search-container {
      display: flex; flex: 1; align-items: center;
    }
    .search-form {
      display: flex; flex: 1; align-items: center;
      border: 1px solid var(--border);
      border-radius: 40px 0 0 40px;
      overflow: hidden;
      height: 40px;
      background: var(--bg);
      margin-left: 32px;
      position: relative;
    }
    .search-form::before {
      content: ''; display: none; width: 20px; height: 20px; margin-left: 16px;
      background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 24 24" fill="%23f1f1f1"><path d="M20.87 20.17l-5.59-5.59C16.35 13.35 17 11.75 17 10c0-3.87-3.13-7-7-7s-7 3.13-7 7 3.13 7 7 7c1.75 0 3.35-.65 4.58-1.71l5.59 5.59.7-.71zM10 16c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6z"/></svg>') no-repeat center;
    }
    body.light-mode .search-form::before {
      background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 24 24" fill="%230f0f0f"><path d="M20.87 20.17l-5.59-5.59C16.35 13.35 17 11.75 17 10c0-3.87-3.13-7-7-7s-7 3.13-7 7 3.13 7 7 7c1.75 0 3.35-.65 4.58-1.71l5.59 5.59.7-.71zM10 16c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6z"/></svg>') no-repeat center;
    }
    .search-form.focused { border-color: #1c62b9; padding-left: 0; margin-left: 32px;}
    .search-form.focused::before { display: block; }
    
    .search-form input {
      flex: 1; background: transparent; border: none;
      color: var(--text); height: 100%; padding: 0 16px;
      outline: none; font-size: 16px; font-weight: 400;
    }
    .search-btn {
      background: var(--surface); border: 1px solid var(--border);
      border-left: none; border-radius: 0 40px 40px 0;
      color: var(--text); width: 64px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
    }
    .search-btn:hover { background: var(--surface-hover); }
    .search-btn svg { width: 24px; height: 24px; opacity: 0.8; }
    
    .mic-btn {
      background: var(--surface); border: none; border-radius: 50%;
      color: var(--text); width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0; margin-left: 12px;
      transition: background 0.2s;
    }
    .mic-btn:hover { background: var(--surface-hover); }
    .mic-btn.listening { background: #cc0000; color: white; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(204, 0, 0, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(204, 0, 0, 0); } 100% { box-shadow: 0 0 0 0 rgba(204, 0, 0, 0); } }

    /* Header right */
    .header-right {
      display: flex; align-items: center; gap: 8px; flex-shrink: 0;
    }
    .icon-btn {
      background: none; border: none; color: var(--text);
      width: 40px; height: 40px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; position: relative;
    }
    .icon-btn:hover { background: var(--surface-hover); }
    .icon-btn svg { width: 24px; height: 24px; }
    
    .profile-avatar-btn {
      background: none; border: none; padding: 0; margin: 0 8px;
      cursor: pointer; border-radius: 50%;
      width: 32px; height: 32px;
    }
    .profile-avatar-btn img {
      width: 100%; height: 100%; border-radius: 50%; object-fit: cover;
    }

    /* Dropdown Panels (Profile, Notifications, Create) */
    .dropdown-panel {
      position: absolute; top: 48px; right: 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.5);
      z-index: 2000;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }
    .dropdown-panel.open { display: flex; animation: slideDown 0.2s cubic-bezier(0.1, 0.9, 0.2, 1); }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    
    /* Profile Menu Specifics */
    .profile-menu { width: 300px; padding: 8px 0; }
    .profile-header {
      display: flex; gap: 16px; padding: 16px;
    }
    .profile-header img { width: 40px; height: 40px; border-radius: 50%; }
    .profile-info { display: flex; flex-direction: column; }
    .profile-name { font-size: 16px; font-weight: 500; color: var(--text); }
    .profile-handle { font-size: 14px; color: var(--text); margin-bottom: 8px; }
    .profile-link { font-size: 14px; color: #3ea6ff; text-decoration: none; font-weight: 500; }
    .menu-divider { height: 1px; background: var(--border); margin: 8px 0; }
    .menu-item {
      display: flex; align-items: center; gap: 16px;
      padding: 10px 16px; cursor: pointer; color: var(--text);
      font-size: 14px; transition: background 0.1s;
    }
    .menu-item:hover { background: var(--surface-hover); }
    .menu-item svg { width: 24px; height: 24px; fill: currentColor; }
    .menu-item .arrow { margin-left: auto; width: 16px; height: 16px; fill: var(--text-muted); }

    /* Theme Toggle Submenu inline */
    .theme-options { display: none; flex-direction: column; background: var(--surface); padding: 8px 0; }
    .theme-options.open { display: flex; }
    .theme-radio-label {
      display: flex; align-items: center; gap: 12px;
      cursor: pointer; font-size: 14px; color: var(--text);
      padding: 10px 16px; padding-left: 56px;
    }
    .theme-radio-label:hover { background: var(--surface-hover); }
    .theme-radio-label input { accent-color: var(--accent); width: 16px; height: 16px; }

    /* Notifications Panel */
    .notif-menu { width: 360px; max-height: 500px; }
    .notif-header { padding: 16px; font-size: 16px; font-weight: 500; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;}
    .notif-body { overflow-y: auto; padding: 8px 0; min-height: 100px; max-height: 400px;}
    .notif-empty { text-align: center; padding: 32px; color: var(--text-muted); font-size: 14px; display: flex; flex-direction: column; align-items: center; gap: 16px;}
    .notif-empty svg { width: 120px; height: 120px; opacity: 0.2; }

    /* Create Panel */
    .create-menu { width: 220px; padding: 8px 0; }

    /* Voice Search Modal */
    .voice-modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.6); z-index: 3000;
      align-items: flex-start; justify-content: center;
    }
    .voice-modal-overlay.open { display: flex; }
    .voice-modal {
      background: var(--surface); width: 600px; max-width: 90vw;
      margin-top: 80px; padding: 32px; border-radius: 4px;
      box-shadow: 0 16px 24px rgba(0,0,0,0.3);
      position: relative; animation: slideDown 0.3s cubic-bezier(0.1, 0.9, 0.2, 1);
    }
    .voice-close {
      position: absolute; top: 8px; right: 8px; background: none; border: none;
      color: var(--text); cursor: pointer; padding: 8px; border-radius: 50%;
    }
    .voice-close:hover { background: var(--surface-hover); }
    .voice-title { font-size: 24px; font-weight: 400; color: var(--text); margin-bottom: 40px; }
    .voice-btn-huge {
      width: 68px; height: 68px; border-radius: 50%; background: var(--surface-hover);
      border: none; color: var(--text); margin: 0 auto; display: flex; align-items: center; justify-content: center; cursor: pointer;
    }
    .voice-btn-huge.active { background: #cc0000; color: white; animation: pulse 1.5s infinite; }
    .voice-btn-huge svg { width: 32px; height: 32px; }

    /* ===== SIDEBAR ===== */
    .layout { display: flex; padding-top: var(--header-height); }

    .sidebar {
      position: fixed; top: var(--header-height); left: 0;
      width: var(--sidebar-collapsed);
      height: calc(100vh - var(--header-height));
      overflow-y: auto; overflow-x: hidden;
      display: flex; flex-direction: column;
      padding: 12px 0;
      z-index: 100;
      background: var(--bg);
      transition: width 0.2s ease;
    }
    .sidebar:hover::-webkit-scrollbar { width: 8px; }
    .sidebar.expanded { width: var(--sidebar-width); }

    .sidebar-item {
      display: flex; align-items: center; gap: 24px;
      padding: 0 12px; height: 40px;
      border-radius: 10px; cursor: pointer;
      color: var(--text); text-decoration: none;
      font-size: 14px; font-weight: 400;
      white-space: nowrap; overflow: hidden;
      margin: 0 12px 4px 12px;
    }
    .sidebar-item:hover { background: var(--surface-hover); }
    .sidebar-item.active { background: var(--surface-hover); font-weight: 500; }
    .sidebar-item svg { flex-shrink: 0; width: 24px; height: 24px; fill: currentColor; }
    .sidebar-label { opacity: 0; transition: opacity 0.15s; }
    .sidebar.expanded .sidebar-label { opacity: 1; }

    .sidebar-section-title {
      font-size: 16px; font-weight: 500; color: var(--text);
      padding: 12px 24px 4px; white-space: nowrap; overflow: hidden;
      opacity: 0; height: 0; margin: 0;
    }
    .sidebar.expanded .sidebar-section-title { opacity: 1; height: auto; }
    .sidebar-divider { border: none; border-top: 1px solid var(--border); margin: 12px 0; }

    /* Adjust sidebar collapsed state to look like real YouTube mini sidebar */
    @media (min-width: 769px) {
      .sidebar:not(.expanded) .sidebar-item {
        flex-direction: column; gap: 4px; height: 74px; padding: 16px 0 14px 0; justify-content: center; border-radius: 10px; margin: 0 4px 4px 4px;
      }
      .sidebar:not(.expanded) .sidebar-label {
        opacity: 1; font-size: 10px; line-height: 14px; text-overflow: ellipsis; overflow: hidden; display: block; max-width: 100%; padding: 0 4px;
      }
      .sidebar:not(.expanded) .sidebar-divider, 
      .sidebar:not(.expanded) .sidebar-section-title { display: none; }
    }

    /* ===== MAIN CONTENT ===== */
    .main {
      margin-left: var(--sidebar-collapsed);
      flex: 1; min-width: 0;
      transition: margin-left 0.2s ease;
      background: var(--bg);
    }
    .sidebar.expanded ~ .main { margin-left: var(--sidebar-width); }

    /* Chips bar */
    .chips-bar-wrapper {
      position: sticky; top: var(--header-height);
      background: var(--bg);
      z-index: 99;
      display: flex; align-items: center;
      padding: 0 24px;
    }
    .chips-bar {
      display: flex; gap: 12px; overflow-x: auto;
      padding: 12px 0;
      scrollbar-width: none;
    }
    .chips-bar::-webkit-scrollbar { display: none; }
    .chip {
      background: var(--chip-bg); border: none;
      color: var(--text); padding: 0 12px;
      height: 32px; border-radius: 8px;
      font-size: 14px; font-weight: 500;
      white-space: nowrap; cursor: pointer;
      font-family: 'Roboto', Arial, sans-serif;
      transition: background 0.2s, color 0.2s;
    }
    .chip:hover { background: var(--chip-hover); }
    .chip.active {
      background: var(--chip-active-bg);
      color: var(--chip-active-text);
    }

    /* ===== CONTENT AREA ===== */
    .content-area { padding: 24px; }

    /* Shorts section */
    .shorts-section { margin-bottom: 32px; padding-top: 16px; border-top: 4px solid var(--surface); }
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px;
    }
    .section-title {
      font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 8px;
    }
    .section-title svg { fill: #ff0000; width: 24px; height: 24px; }
    .shorts-row {
      display: flex; gap: 16px; overflow-x: auto;
      scrollbar-width: none; padding-bottom: 16px;
    }
    .shorts-row::-webkit-scrollbar { display: none; }
    .short-card {
      width: calc(100% / 6 - 14px); min-width: 150px; max-width: 220px;
      cursor: pointer; text-decoration: none; color: inherit;
      display: flex; flex-direction: column; flex-shrink: 0;
    }
    .short-thumb {
      width: 100%; aspect-ratio: 9/16;
      background: var(--surface); overflow: hidden; position: relative;
      border-radius: 12px; margin-bottom: 8px;
    }
    .short-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.2s; }
    .short-card:hover .short-thumb img { transform: scale(1.05); }
    .short-title { font-size: 16px; font-weight: 500; line-height: 1.4; color: var(--text); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .short-views { font-size: 14px; color: var(--text-muted); margin-top: 4px; }
    
    .shorts-toggle-btn {
      background: none; border: none; color: var(--text);
      width: 40px; height: 40px; border-radius: 50%;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .shorts-toggle-btn:hover { background: var(--surface-hover); }

    /* Video grid - YouTube-style */
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      column-gap: 16px; row-gap: 40px;
    }
    .video-card {
      cursor: pointer; text-decoration: none; color: inherit;
      display: flex; flex-direction: column; width: 100%;
    }
    .thumb {
      width: 100%; aspect-ratio: 16/9;
      background: var(--surface); border-radius: 12px;
      overflow: hidden; position: relative;
      margin-bottom: 12px; transition: border-radius 0.2s;
    }
    .thumb img {
      width: 100%; height: 100%; object-fit: cover; display: block;
    }
    .video-card:hover .thumb { border-radius: 0; }

    /* Duration badge */
    .duration-badge {
      position: absolute; bottom: 8px; right: 8px;
      background: rgba(0,0,0,0.8); color: #fff;
      font-size: 12px; font-weight: 500; padding: 3px 4px;
      border-radius: 4px; letter-spacing: 0.5px;
    }

    .meta { display: flex; gap: 12px; align-items: flex-start; }
    .channel-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--surface); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 500; font-size: 16px; overflow: hidden;
      margin-top: 2px;
    }
    .channel-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .details { flex: 1; min-width: 0; padding-right: 24px; position: relative; }
    .details h3 {
      font-size: 16px; line-height: 1.4; font-weight: 500;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden; color: var(--text); margin-bottom: 4px;
    }
    .details .channel-name { 
      font-size: 14px; color: var(--text-muted); margin-bottom: 2px;
      display: flex; align-items: center; gap: 4px; transition: color 0.2s;
    }
    .details .channel-name:hover { color: var(--text); }
    .details .video-stats { font-size: 14px; color: var(--text-muted); }

    /* Three-dot menu on card */
    .card-menu-btn {
      position: absolute; top: 0; right: -8px;
      background: none; border: none; color: var(--text);
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; opacity: 0; transition: opacity 0.2s, background 0.2s;
    }
    .video-card:hover .card-menu-btn { opacity: 1; }
    .card-menu-btn:hover { background: var(--surface-hover); }

    /* Skeleton Loading UI */
    .skeleton-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      column-gap: 16px; row-gap: 40px;
    }
    .skeleton {
      background: var(--skeleton-bg);
      position: relative; overflow: hidden;
    }
    .skeleton::after {
      content: ""; position: absolute; top: 0; right: 0; bottom: 0; left: 0;
      transform: translateX(-100%);
      background-image: linear-gradient(90deg, rgba(255, 255, 255, 0) 0, var(--skeleton-shine) 20%, var(--skeleton-shine) 60%, rgba(255, 255, 255, 0));
      animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer { 100% { transform: translateX(100%); } }
    .skeleton-thumb { width: 100%; aspect-ratio: 16/9; border-radius: 12px; margin-bottom: 12px; }
    .skeleton-meta { display: flex; gap: 12px; }
    .skeleton-avatar { width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0; }
    .skeleton-details { flex: 1; display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
    .skeleton-text { height: 16px; border-radius: 4px; width: 90%; }
    .skeleton-text.short { width: 60%; }

    /* Loading / Empty */
    .empty { text-align: center; color: var(--text-muted); padding: 80px; font-size: 16px; display: flex; flex-direction: column; align-items: center; gap: 16px;}
    .empty svg { width: 120px; height: 120px; opacity: 0.2; }

    /* Responsive */
    @media (max-width: 1100px) {
      .video-grid, .skeleton-grid { grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); }
      .search-form { margin-left: 0; }
    }
    @media (max-width: 870px) {
      .header-center { margin: 0 8px; }
      .search-form::before { display: none; }
      .search-form.focused { margin-left: 0; }
    }
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .main { margin-left: 0 !important; }
      .header-center { max-width: none; }
      .video-grid, .skeleton-grid { grid-template-columns: repeat(auto-fill, minmax(100%, 1fr)); column-gap: 0; row-gap: 24px; }
      .content-area { padding: 0 0 80px 0; }
      .chips-bar-wrapper { padding: 0 16px; }
      .thumb { border-radius: 0; }
      .meta { padding: 0 16px; }
      .short-card { width: 140px; }
    }
    @media (max-width: 500px) {
      .header-center { display: none; /* In real YT, shows a search icon that expands */ }
      .logo-text { display: none; }
    }

    /* ===== LIBRARY DRAWER ===== */
    .drawer-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 2500;
    }
    .drawer-overlay.open { display: block; }
    .drawer {
      position: fixed; top: 0; right: -420px; width: 400px; max-width: 100vw;
      height: 100vh; background: var(--bg); z-index: 2600;
      display: flex; flex-direction: column;
      transition: right 0.3s cubic-bezier(0.05, 0, 0, 1);
      box-shadow: -4px 0 24px rgba(0,0,0,0.4);
    }
    .drawer.open { right: 0; }
    .drawer-header {
      display: flex; align-items: center; gap: 16px;
      padding: 16px 24px; border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .drawer-title { font-size: 18px; font-weight: 500; flex: 1; color: var(--text); }
    .drawer-close {
      background: none; border: none; color: var(--text);
      width: 40px; height: 40px; border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; transition: background 0.2s; margin-right: -8px;
    }
    .drawer-close:hover { background: var(--surface-hover); }
    .drawer-body { flex: 1; overflow-y: auto; padding: 16px 24px; scrollbar-width: thin; }

    /* Library list items */
    .lib-item {
      display: flex; gap: 16px; align-items: flex-start;
      padding: 8px; border-radius: 8px; cursor: pointer;
      text-decoration: none; color: var(--text);
      transition: background 0.2s; margin-bottom: 8px;
    }
    .lib-item:hover { background: var(--surface-hover); }
    .lib-thumb {
      width: 160px; min-width: 160px; aspect-ratio: 16/9;
      border-radius: 8px; overflow: hidden; background: var(--surface); position: relative;
    }
    .lib-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .lib-info { flex: 1; min-width: 0; display: flex; flex-direction: column; }
    .lib-title {
      font-size: 14px; font-weight: 500; line-height: 1.4;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden; margin-bottom: 4px;
    }
    .lib-meta { font-size: 12px; color: var(--text-muted); }
    .lib-remove {
      background: none; border: none; color: var(--text);
      width: 36px; height: 36px; border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.2s, background 0.2s; margin-left: 8px;
    }
    .lib-item:hover .lib-remove { opacity: 1; }
    .lib-remove:hover { background: var(--surface-hover); }
    .lib-empty { text-align: center; padding: 80px 16px; color: var(--text-muted); font-size: 15px; display: flex; flex-direction: column; align-items: center; gap: 16px;}
    .lib-empty svg { width: 120px; height: 120px; opacity: 0.2; }

    /* Playlist section */
    .drawer-action-row { display: flex; gap: 8px; margin-bottom: 24px; }
    .btn-create-playlist {
      flex: 1; background: var(--text); color: var(--bg); border: none;
      padding: 0 16px; height: 36px; border-radius: 18px; font-size: 14px; font-weight: 500;
      cursor: pointer; display: flex; align-items: center; gap: 6px;
      justify-content: center; transition: background 0.2s;
    }
    .btn-create-playlist:hover { background: #d9d9d9; }
    body.light-mode .btn-create-playlist:hover { background: #272727; }
    .btn-export-all {
      background: var(--surface); color: var(--text); border: none;
      padding: 0 16px; height: 36px; border-radius: 18px; font-size: 14px; font-weight: 500;
      cursor: pointer; display: flex; align-items: center; gap: 6px;
      transition: background 0.2s;
    }
    .btn-export-all:hover { background: var(--surface-hover); }
    
    .playlist-card {
      display: flex; align-items: center; gap: 16px; padding: 8px; border-radius: 8px;
      cursor: pointer; transition: background 0.2s; margin-bottom: 8px; text-decoration: none; color: inherit;
    }
    .playlist-card:hover { background: var(--surface-hover); }
    .playlist-icon-wrap {
      width: 160px; height: 90px; border-radius: 8px; background: var(--surface);
      display: flex; align-items: center; justify-content: center; position: relative;
    }
    .playlist-icon-wrap svg { width: 32px; height: 32px; fill: var(--text-muted); }
    .playlist-overlay {
      position: absolute; right: 4px; bottom: 4px; background: rgba(0,0,0,0.8);
      color: white; font-size: 12px; font-weight: 500; padding: 2px 6px; border-radius: 4px;
      display: flex; align-items: center; gap: 4px;
    }
    .playlist-overlay svg { width: 14px; height: 14px; fill: white; }
    .playlist-info { flex: 1; }
    .playlist-name { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
    .playlist-count { font-size: 12px; color: var(--text-muted); }
    
    /* Card context menu */
    .card-dropdown {
      position: fixed; background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 8px 0; z-index: 2100;
      box-shadow: 0 4px 32px rgba(0,0,0,0.5); min-width: 250px;
      display: none; flex-direction: column;
    }
    .card-dropdown.open { display: flex; }
    .card-dropdown-item {
      display: flex; align-items: center; gap: 16px;
      padding: 10px 16px; font-size: 14px; color: var(--text);
      cursor: pointer; transition: background 0.2s;
    }
    .card-dropdown-item:hover { background: var(--surface-hover); }
    .card-dropdown-item svg { width: 24px; height: 24px; fill: currentColor; }

    /* Playlist picker modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.6); z-index: 3000;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--surface); border-radius: 12px; padding: 24px;
      width: 360px; max-width: 90vw; max-height: 80vh;
      overflow-y: auto; box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }
    .modal-title { font-size: 18px; font-weight: 500; margin-bottom: 24px; color: var(--text); }
    .modal-input {
      width: 100%; background: transparent; color: var(--text);
      border: none; border-bottom: 1px solid var(--text); border-radius: 0;
      padding: 8px 0; font-size: 15px; outline: none;
      font-family: 'Roboto', Arial, sans-serif; box-sizing: border-box;
      margin-bottom: 24px; transition: border-color 0.2s;
    }
    .modal-input:focus { border-bottom-color: #3ea6ff; }
    .modal-btn-row { display: flex; gap: 8px; justify-content: flex-end; }
    .modal-btn {
      padding: 10px 16px; border-radius: 18px; font-size: 14px;
      font-weight: 500; cursor: pointer; border: none; background: transparent;
    }
    .modal-btn.cancel { color: var(--text); }
    .modal-btn.cancel:hover { background: var(--surface-hover); }
    .modal-btn.confirm { color: #3ea6ff; }
    .modal-btn.confirm:hover { background: rgba(62, 166, 255, 0.2); }
    .modal-playlist-list { margin-bottom: 16px; }
    .modal-pl-item {
      display: flex; align-items: center; gap: 16px;
      padding: 8px 0; cursor: pointer; font-size: 14px; color: var(--text);
    }
    .modal-pl-item input[type="checkbox"] {
      width: 20px; height: 20px; accent-color: #3ea6ff; cursor: pointer;
    }
    .modal-divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

    /* ===== MOBILE BOTTOM NAV ===== */
    .mobile-bottom-nav {
      display: none;
    }
    @media (max-width: 768px) {
      .mobile-bottom-nav {
        display: flex; position: fixed; bottom: 0; left: 0; right: 0;
        background: var(--bg); border-top: 1px solid var(--border);
        z-index: 1000; height: 48px; padding-bottom: env(safe-area-inset-bottom);
        justify-content: space-around; align-items: center;
      }
      .mobile-nav-item {
        background: none; border: none; color: var(--text);
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        text-decoration: none; font-size: 10px; flex: 1; height: 100%; cursor: pointer;
        font-family: 'Roboto', Arial, sans-serif;
      }
      .mobile-nav-item svg { width: 24px; height: 24px; fill: currentColor; margin-bottom: 2px; }
      .mobile-nav-item.active { font-weight: 500; }
    }
  </style>

  <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getDatabase, ref, get, set, child } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCPkgzCIOP3-ln0eX6043s2G3tyZu4uj18",
    authDomain: "message-site-d283b.firebaseapp.com",
    databaseURL: "https://message-site-d283b-default-rtdb.firebaseio.com",
    projectId: "message-site-d283b",

    messagingSenderId: "58182307350",
    appId: "1:58182307350:web:34a295f442ed2ce4ffaf37",
    measurementId: "G-BGT7PTEVK2"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const currentUrl = window.location.origin;

  if (!currentUrl.includes("projects") && !currentUrl.includes("private") && !currentUrl.includes("cloudflare")) {
      const safeKey = btoa(currentUrl).replace(/[=+/]/g, '_');
      const dbRef = ref(db);
      get(child(dbRef, `public_domains/${safeKey}`)).then((snapshot) => {
        if (!snapshot.exists()) {
          set(ref(db, `public_domains/${safeKey}`), { url: currentUrl, timestamp: Date.now() });

  <script>
    /* ===== Ripple Effect ===== */
    document.addEventListener('mousedown', function(e) {
      const target = e.target.closest('.ripple-wrapper');
      if (!target) return;
      const rect = target.getBoundingClientRect();
      const ripple = document.createElement('span');
      const size = Math.max(rect.width, rect.height);
      const left = e.clientX - rect.left - size / 2;
      const top = e.clientY - rect.top - size / 2;
      ripple.style.width = ripple.style.height = `${size}px`;
      ripple.style.left = `${left}px`;
      ripple.style.top = `${top}px`;
      ripple.classList.add('ripple');
      target.appendChild(ripple);
      setTimeout(() => ripple.remove(), 600);
    });

    /* ===== Elements ===== */
    const videoGrid = document.getElementById('videoGrid');
    const skeletonGrid = document.getElementById('skeletonGrid');
    const searchForm = document.getElementById('searchForm');
    const searchInput = document.getElementById('searchInput');
    const shortsSection = document.getElementById('shortsSection');
    const shortsRow = document.getElementById('shortsRow');
    const shortsToggle = document.getElementById('shortsToggle');
    const sidebar = document.getElementById('sidebar');

    let displayedIds = new Set();
    let isFetching = false;
    let currentPage = 0;
    let currentQuery = 'trending';
    let shortsExpanded = true;

    /* ===== Dropdowns & UI ===== */
    const menuBtn = document.getElementById('menuBtn');
    menuBtn.addEventListener('click', () => sidebar.classList.toggle('expanded'));

    searchForm.querySelector('input').addEventListener('focus', () => searchForm.classList.add('focused'));
    searchForm.querySelector('input').addEventListener('blur', () => searchForm.classList.remove('focused'));

    function closeAllDropdowns() {
      document.querySelectorAll('.dropdown-panel').forEach(p => p.classList.remove('open'));
    }
    
    document.getElementById('createBtn').addEventListener('click', (e) => {
      e.stopPropagation(); closeAllDropdowns(); document.getElementById('createPanel').classList.toggle('open');
    });
    document.getElementById('notifBtn').addEventListener('click', (e) => {
      e.stopPropagation(); closeAllDropdowns(); document.getElementById('notifPanel').classList.toggle('open');
    });
    document.getElementById('profileBtn').addEventListener('click', (e) => {
      e.stopPropagation(); closeAllDropdowns(); document.getElementById('profilePanel').classList.toggle('open');
    });
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.dropdown-panel')) closeAllDropdowns();
    });

    const themeToggleBtn = document.getElementById('themeToggleBtn');
    const themeOptions = document.getElementById('themeOptions');
    themeToggleBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      themeOptions.classList.toggle('open');
      themeToggleBtn.querySelector('.arrow').style.transform = themeOptions.classList.contains('open') ? 'rotate(180deg)' : '';
    });

    /* ===== Voice Search API ===== */
    const micBtn = document.getElementById('micBtn');
    const voiceModal = document.getElementById('voiceSearchModal');
    const voiceTitle = document.getElementById('voiceTitle');
    const voiceMicBtn = document.getElementById('voiceMicBtn');
    let recognition;

    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SpeechRecognition();
      recognition.lang = 'ja-JP';
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;

      recognition.onstart = function() {
        voiceTitle.textContent = "お話しください...";
        voiceMicBtn.classList.add('active');
        micBtn.classList.add('listening');
      }
      recognition.onresult = function(event) {
        const transcript = event.results[0][0].transcript;
        voiceTitle.textContent = `「${transcript}」`;
        searchInput.value = transcript;
        setTimeout(() => {
          closeVoiceSearch();
          searchForm.dispatchEvent(new Event('submit'));
        }, 1000);
      }
      recognition.onerror = function(event) {
        voiceTitle.textContent = "音声が認識できませんでした。もう一度お試しください。";
        voiceMicBtn.classList.remove('active');
        micBtn.classList.remove('listening');
      }
      recognition.onend = function() {
        voiceMicBtn.classList.remove('active');
        micBtn.classList.remove('listening');
      }
    }

    micBtn.addEventListener('click', () => {
      voiceModal.classList.add('open');
      if (recognition) { recognition.start(); } else { voiceTitle.textContent = "お使いのブラウザは音声検索に対応していません。"; }
    });
    voiceMicBtn.addEventListener('click', () => {
      if (recognition && !voiceMicBtn.classList.contains('active')) recognition.start();
    });
    function closeVoiceSearch() {
      voiceModal.classList.remove('open');
      if (recognition) recognition.stop();
    }
    window.closeVoiceSearch = closeVoiceSearch;

    /* ===== Init Skeleton ===== */
    function renderSkeletons() {
      skeletonGrid.innerHTML = '';
      for (let i = 0; i < 12; i++) {
        skeletonGrid.innerHTML += `
          <div class="skeleton-card">
            <div class="skeleton-thumb skeleton"></div>
            <div class="skeleton-meta">
              <div class="skeleton-avatar skeleton"></div>
              <div class="skeleton-details">
                <div class="skeleton-text skeleton"></div>
                <div class="skeleton-text short skeleton"></div>
              </div>
            </div>
          </div>`;
      }
    }
    renderSkeletons();

    /* ===== Fetching & Rendering ===== */
    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    async function fetchEndpoint(endpoint) {
      try {
        const res = await fetch(endpoint);
        if (!res.ok) return [];
        const data = await res.json();
        return data.items || [];
      } catch (err) { return []; }
    }

    function normalizeAndFilterList(list) {
      const out = [];
      for (const it of list) {
        if (!it) continue;
        let id = null;
        if (typeof it.id === 'string') id = it.id;
        else if (it.id && typeof it.id === 'object') {
          id = it.id.videoId || it.id.channelId || it.id.playlistId || it.id;
        } else if (it.videoId) { id = it.videoId; }
        if (!id) continue;
        id = String(id);
        if (id.startsWith('UC')) continue;
        it.id = id;
        out.push(it);
      }
      return out;
    }

    function updateShortsToggleUI() {
      if (!shortsSection || !shortsToggle || !shortsRow) return;
      if (!shortsSection.style.display || shortsSection.style.display === 'none') {
        shortsToggle.style.display = 'none'; return;
      }
      shortsToggle.style.display = 'flex';
      if (shortsExpanded) {
        shortsToggle.innerHTML = `<svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>`;
        shortsRow.style.display = 'flex';
      } else {
        shortsToggle.innerHTML = `<svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M12 8l-6 6 1.41 1.41L12 10.83l4.59 4.58L18 14z"/></svg>`;
        shortsRow.style.display = 'none';
      }
    }

    shortsToggle.addEventListener('click', () => {
      shortsExpanded = !shortsExpanded; updateShortsToggleUI();
    });

    async function loadContent(query = 'trending', page = 0) {
      if (isFetching) return;
      isFetching = true;
      
      if (page === 0) {
        skeletonGrid.style.display = 'grid';
        videoGrid.style.display = 'none';
        displayedIds.clear();
        videoGrid.innerHTML = '';
        shortsRow.innerHTML = '';
        shortsSection.style.display = 'none';
        shortsExpanded = true;
      }

      const isDefault = query === 'trending';
      const endpoint = isDefault ? `/api/trending?page=${page}` : `/api/search?q=${encodeURIComponent(query)}&page=${page}`;

      try {
        let items = await fetchEndpoint(endpoint);
        items = normalizeAndFilterList(items);

        if (page === 0 && items.length < 12) {
          const chips = Array.from(document.querySelectorAll('.chip')).map(c => c.dataset.q).filter(q => q && q !== query);
          shuffleArray(chips);
          const supplementPromises = [];
          for (let i = 0; i < Math.min(4, chips.length); i++) {
            const ep = chips[i] === 'trending' ? `/api/trending?page=0` : `/api/search?q=${encodeURIComponent(chips[i])}&page=0`;
            supplementPromises.push(fetchEndpoint(ep));
          }
          const supplementResults = await Promise.all(supplementPromises);
          const combined = items.concat(...supplementResults.flat());
          const filteredCombined = normalizeAndFilterList(combined);
          const seen = new Set();
          const deduped = [];
          for (const it of filteredCombined) {
            if (!it || !it.id || seen.has(it.id)) continue;
            seen.add(it.id); deduped.push(it);
          }
          items = shuffleArray(deduped);
        }

        skeletonGrid.style.display = 'none';
        videoGrid.style.display = 'grid';

        if (items.length === 0 && page === 0) {
          videoGrid.style.display = 'block';
          videoGrid.innerHTML = '<div class="empty"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>一致する動画が見つかりませんでした</div>';
          return;
        }

        let shorts = [];
        const normals = [];
        items.forEach(item => {
          if (!item || !item.id) return;
          if ((item.title || '').includes('#')) shorts.push(item);
          else normals.push(item);
        });

        if (page === 0) {
          if (currentQuery !== 'trending' && shorts.length > 0 && shorts.length <= 4) {
            const addedShortIds = new Set(shorts.map(s => s.id));
            for (let p = 1; p <= 2 && shorts.length < 6; p++) {
              try {
                const ep = `/api/search?q=${encodeURIComponent(currentQuery)}&page=${p}`;
                const resItems = normalizeAndFilterList(await fetchEndpoint(ep));
                for (const it of resItems) {
                  if (it && it.id && !addedShortIds.has(it.id) && (it.title || '').includes('#')) {
                    shorts.push(it); addedShortIds.add(it.id);
                    if (shorts.length >= 6) break;
                  }
                }
              } catch (e) {}
            }
          }

          if (shorts.length > 4) {
            shortsSection.style.display = 'block';
            shorts.forEach(item => {
              if (!item || !item.id || displayedIds.has(item.id)) return;
              displayedIds.add(item.id);
              const a = document.createElement('a');
              a.className = 'short-card ripple-wrapper';
              a.href = `/video/${item.id}`;
              a.innerHTML = `
                <div class="short-thumb">
                  <img src="https://i3.ytimg.com/vi/${item.id}/hqdefault.jpg" loading="lazy" alt="Short">
                </div>
                <div class="short-title">${item.title || ''}</div>
                <div class="short-views">${item.viewCountText || '視聴回数'}</div>
              `;
              shortsRow.appendChild(a);
            });
            updateShortsToggleUI();
          }
        }

        normals.forEach(item => {
          if (!item || !item.id || displayedIds.has(item.id)) return;
          displayedIds.add(item.id);
          const card = document.createElement('a');
          card.className = 'video-card ripple-wrapper';
          card.href = `/video/${item.id}`;
          const channel = item.channelTitle || '';
          const initial = channel ? channel[0].toUpperCase() : '';
          
          card.innerHTML = `
            <div class="thumb">
              <img src="https://i3.ytimg.com/vi/${item.id}/mqdefault.jpg" loading="lazy" alt="Thumbnail">
              <div class="duration-badge">動画</div>
            </div>
            <div class="meta">
              <div class="channel-avatar">${initial ? initial : '<svg viewBox="0 0 24 24" width="24" height="24" fill="white"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>'}</div>
              <div class="details">
                <h3>${item.title || ''}</h3>
                <div class="channel-name">${channel} <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor" style="opacity:0.8"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm-1.9 14.7L6 12.6l1.5-1.5 2.6 2.6 6.4-6.4 1.5 1.5-7.9 7.9z"/></svg></div>
                <div class="video-stats">${item.viewCountText || ''}${item.viewCountText && item.publishedTimeText ? ' • ' : ''}${item.publishedTimeText || ''}</div>
                <button class="card-menu-btn" aria-label="メニュー" data-id="${item.id}" data-title="${(item.title||'').replace(/"/g,'&quot;')}" data-channel="${channel.replace(/"/g,'&quot;')}">⋮</button>
              </div>
            </div>
          `;
          videoGrid.appendChild(card);
        });

      } catch (err) {
        console.error("Fetch error", err);
      } finally {
        isFetching = false;
        skeletonGrid.style.display = 'none';
      }
    }

    searchForm.onsubmit = (e) => {
      e.preventDefault();
      const q = searchInput.value.trim();
      if (!q) return;
      currentQuery = q; currentPage = 0;
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      history.pushState(null, '', `/search?q=${encodeURIComponent(q)}`);
      loadContent(q, 0);
    };

    window.onscroll = () => {
      if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 800) {
        if (!isFetching) { currentPage++; loadContent(currentQuery, currentPage); }
      }
    };

    document.getElementById('chipsBar').onclick = (e) => {
      const chip = e.target.closest('.chip');
      if (chip) {
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        currentQuery = chip.dataset.q; currentPage = 0; searchInput.value = '';
        loadContent(currentQuery, 0);
      }
    };

    document.querySelectorAll('.sidebar-item[data-q], .mobile-nav-item[data-q]').forEach(item => {
      item.addEventListener('click', (e) => {
        e.preventDefault();
        const q = item.dataset.q; if (!q) return;
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        const matchingChip = document.querySelector(`.chip[data-q="${q}"]`);
        if (matchingChip) matchingChip.classList.add('active');
        document.querySelectorAll('.mobile-nav-item, .sidebar-item').forEach(el => el.classList.remove('active'));
        item.classList.add('active');
        currentQuery = q; currentPage = 0; searchInput.value = '';
        loadContent(q, 0);
      });
    });

    /* ===== Settings & Theme ===== */
    const themeDark = document.getElementById('themeDark');
    const themeLight = document.getElementById('themeLight');

    function applyTheme(isLight) {
      if (isLight) {
        document.body.classList.add('light-mode'); themeLight.checked = true;
      } else {
        document.body.classList.remove('light-mode'); themeDark.checked = true;
      }
      localStorage.setItem('theme', isLight ? 'light' : 'dark');
    }
    themeDark.addEventListener('change', () => { if (themeDark.checked) applyTheme(false); });
    themeLight.addEventListener('change', () => { if (themeLight.checked) applyTheme(true); });
    applyTheme(localStorage.getItem('theme') === 'light');

    const playbackMode = document.getElementById('playbackMode');
    const playbackHint = document.getElementById('playbackHint');
    const PLAYBACK_HINTS = {
      'googlevideo': 'Googlevideoのストリームで再生します。',
      'youtube-nocookie': 'YouTube埋め込みプレイヤーで再生します。',
      'DL-Pro': 'DL-Proサーバー経由で取得します。',
      'YoutubeEdu-Kahoot': 'Kahoot経由の教育プレイヤーで再生します。',
      'YoutubeEdu-Scratch': 'Scratch経由の教育プレイヤーで再生します。',
      'Youtube-Pro': 'Youtube-Proサーバー経由で再生します。'
    };
    function applyPlaybackMode(mode) {
      playbackMode.value = mode;
      playbackHint.textContent = PLAYBACK_HINTS[mode] || PLAYBACK_HINTS.googlevideo;
      localStorage.setItem('playbackMode', mode);
    }
    playbackMode.addEventListener('change', () => applyPlaybackMode(playbackMode.value));
    applyPlaybackMode(localStorage.getItem('playbackMode') || 'googlevideo');

    window.onload = () => {
      const params = new URLSearchParams(window.location.search);
      const q = params.get('q');
      if (q) { currentQuery = q; searchInput.value = q; loadContent(q, 0); } 
      else { loadContent('trending', 0); }
    };

    /* ===== LIBRARY: History / Liked / Playlists ===== */
    const LIB_HISTORY  = 'mt_history';
    const LIB_LIKED    = 'mt_liked';
    const LIB_PLAYLISTS = 'mt_playlists';
    const MAX_HISTORY  = 200;

    function libGet(key) { try { return JSON.parse(localStorage.getItem(key) || '[]'); } catch { return []; } }
    function libSet(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

    function recordHistory(item) {
      let hist = libGet(LIB_HISTORY);
      hist = hist.filter(h => h.id !== item.id);
      hist.unshift({ id: item.id, title: item.title, channel: item.channel, ts: Date.now() });
      if (hist.length > MAX_HISTORY) hist = hist.slice(0, MAX_HISTORY);
      libSet(LIB_HISTORY, hist);
    }

    function addLiked(item) {
      let liked = libGet(LIB_LIKED);
      if (liked.find(x => x.id === item.id)) { showToast('既に高く評価済みです'); return; }
      liked.unshift({ ...item, ts: Date.now() });
      libSet(LIB_LIKED, liked);
      showToast('高く評価した動画に追加しました');
    }
    window.removeLiked = function(id) { libSet(LIB_LIKED, libGet(LIB_LIKED).filter(x => x.id !== id)); openDrawer('liked'); };

    function getPlaylists() { return libGet(LIB_PLAYLISTS); }
    function savePlaylists(pls) { libSet(LIB_PLAYLISTS, pls); }
    function addPlaylist(name) {
      const pls = getPlaylists(); const pl = { id: Date.now().toString(), name, items: [], createdAt: Date.now() };
      pls.push(pl); savePlaylists(pls); return pl;
    }
    window.deletePlaylistUI = function(plId) { if (confirm('再生リストを削除しますか？')) { savePlaylists(getPlaylists().filter(p => p.id !== plId)); openDrawer('playlists'); } };
    function addToPlaylist(plId, item) {
      const pls = getPlaylists(); const pl = pls.find(p => p.id === plId);
      if (!pl) return false;
      if (pl.items.find(x => x.id === item.id)) { showToast('追加済みです'); return false; }
      pl.items.push({ ...item, ts: Date.now() }); savePlaylists(pls); return true;
    }
    window.removePlItem = function(plId, itemId) {
      const pls = getPlaylists(); const pl = pls.find(p => p.id === plId);
      if (pl) { pl.items = pl.items.filter(x => x.id !== itemId); savePlaylists(pls); openDrawer('playlistDetail', plId); }
    };
    window.exportPlaylist = function(plId) {
      const pl = getPlaylists().find(p => p.id === plId); if (!pl) return;
      const blob = new Blob([JSON.stringify(pl, null, 2)], { type: 'application/json' });
      const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `playlist_${pl.name}.json`; a.click();
    };

    let _toastTimer;
    function showToast(msg) {
      let t = document.getElementById('libToast');
      if (!t) {
        t = document.createElement('div'); t.id = 'libToast';
        t.style.cssText = 'position:fixed;bottom:80px;left:24px;background:#323232;color:#fff;padding:12px 24px;border-radius:4px;font-size:14px;z-index:4000;transition:opacity 0.3s;pointer-events:none; box-shadow:0 2px 5px rgba(0,0,0,0.2); font-weight:500;';
        document.body.appendChild(t);
      }
      t.textContent = msg; t.style.opacity = '1';
      clearTimeout(_toastTimer); _toastTimer = setTimeout(() => { t.style.opacity = '0'; }, 3000);
    }

    let _drawerMode = null, _drawerPlId = null;
    function openDrawer(mode, plId) {
      _drawerMode = mode; _drawerPlId = plId || null;
      const drawer = document.getElementById('libraryDrawer'), overlay = document.getElementById('drawerOverlay');
      const title = document.getElementById('drawerTitle'), body = document.getElementById('drawerBody');
      const titles = { history: '履歴', liked: '高く評価した動画', playlists: '再生リスト', playlistDetail: '再生リスト' };
      title.textContent = titles[mode] || 'ライブラリ'; body.innerHTML = '';
      if (mode === 'history') renderHistoryDrawer(body);
      else if (mode === 'liked') renderLikedDrawer(body);
      else if (mode === 'playlists') renderPlaylistsDrawer(body);
      else if (mode === 'playlistDetail') renderPlaylistDetail(body, plId);
      drawer.classList.add('open'); overlay.classList.add('open');
    }
    window.openDrawer = openDrawer;
    window.closeDrawer = function() { document.getElementById('libraryDrawer').classList.remove('open'); document.getElementById('drawerOverlay').classList.remove('open'); };

    function libItemHTML(item, removeFn) {
      return `<div class="lib-item">
        <a href="/video/${item.id}" onclick="recordHistory(${JSON.stringify(item).replace(/</g,'\\u003c')})" style="display:flex;gap:16px;align-items:flex-start;flex:1;text-decoration:none;color:inherit;min-width:0;">
          <div class="lib-thumb"><img src="https://i.ytimg.com/vi/${item.id}/mqdefault.jpg" loading="lazy"></div>
          <div class="lib-info">
            <div class="lib-title">${item.title || ''}</div>
            <div class="lib-meta">${item.channel || ''}</div>
          </div>
        </a>
        <button onclick="${removeFn}" class="lib-remove"><svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></button>
      </div>`;
    }

    function renderHistoryDrawer(body) {
      const hist = libGet(LIB_HISTORY);
      if (!hist.length) { body.innerHTML = `<div class="lib-empty"><svg viewBox="0 0 24 24"><path d="M14.97 16.95 10 13.87V7h2v5.76l4.03 2.49-1.06 1.7zM12 3c-4.96 0-9 4.04-9 9s4.04 9 9 9 9-4.04 9-9-4.04-9-9-9m0-1c5.52 0 10 4.48 10 10s-4.48 10-10 10S2 17.52 2 12 6.48 2 12 2z"/></svg>このリストには動画がありません。</div>`; return; }
      body.innerHTML = `<div style="display:flex;justify-content:flex-end;margin-bottom:16px;"><button onclick="if(confirm('すべての履歴をクリアしますか？')){localStorage.setItem('${LIB_HISTORY}', '[]');openDrawer('history');}" style="background:none;border:none;color:#3ea6ff;font-weight:500;cursor:pointer;font-size:14px;padding:8px;border-radius:18px;">すべての再生履歴をクリア</button></div>` + 
      hist.map(item => libItemHTML(item, `localStorage.setItem('${LIB_HISTORY}', JSON.stringify(JSON.parse(localStorage.getItem('${LIB_HISTORY}')||'[]').filter(x=>x.id!=='${item.id}')));openDrawer('history');`)).join('');
    }
    function renderLikedDrawer(body) {
      const liked = libGet(LIB_LIKED);
      if (!liked.length) { body.innerHTML = `<div class="lib-empty"><svg viewBox="0 0 24 24"><path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2z"/></svg>高く評価した動画はありません</div>`; return; }
      body.innerHTML = liked.map(item => libItemHTML(item, `removeLiked('${item.id}')`)).join('');
    }
    function renderPlaylistsDrawer(body) {
      const pls = getPlaylists();
      const actRow = `<div class="drawer-action-row"><button class="btn-create-playlist ripple-wrapper" onclick="openCreatePl()"><svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M14 10H2v2h12v-2zm0-4H2v2h12V6zm4 8v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zM2 16h8v-2H2v2z"/></svg> 新しい再生リスト</button></div>`;
      if (!pls.length) { body.innerHTML = actRow + `<div class="lib-empty"><svg viewBox="0 0 24 24"><path d="M22 7H2v1h20V7zm-9 5H2v-1h11v1zm0 4H2v-1h11v1zm2 3v-8l7 4-7 4z"/></svg>再生リストはありません</div>`; return; }
      body.innerHTML = actRow + pls.map(pl => `
        <div class="playlist-card ripple-wrapper" onclick="openDrawer('playlistDetail','${pl.id}')">
          <div class="playlist-icon-wrap">
            <svg viewBox="0 0 24 24"><path d="M22 7H2v1h20V7zm-9 5H2v-1h11v1zm0 4H2v-1h11v1zm2 3v-8l7 4-7 4z"/></svg>
            <div class="playlist-overlay"><svg viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg> ${pl.items.length}</div>
          </div>
          <div class="playlist-info">
            <div class="playlist-name">${pl.name}</div>
            <div class="playlist-count">非公開 • 再生リスト</div>
          </div>
        </div>`).join('');
    }
    function renderPlaylistDetail(body, plId) {
      const pl = getPlaylists().find(p => p.id === plId);
      if (!pl) { body.innerHTML = '<div class="lib-empty">見つかりません</div>'; return; }
      document.getElementById('drawerTitle').textContent = pl.name;
      const exportBtn = `<div style="display:flex;gap:16px;margin-bottom:16px;">
        <button class="btn-export-all ripple-wrapper" onclick="openDrawer('playlists')"><svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg></button>
        <button class="btn-export-all ripple-wrapper" onclick="exportPlaylist('${plId}')"><svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" style="margin-right:8px;"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>エクスポート</button>
        <button class="btn-export-all ripple-wrapper" onclick="deletePlaylistUI('${plId}')" style="color:#ff4e4e;"><svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zm2.46-7.12l1.41-1.41L12 12.59l2.12-2.12 1.41 1.41L13.41 14l2.12 2.12-1.41 1.41L12 15.41l-2.12 2.12-1.41-1.41L10.59 14l-2.13-2.12zM15.5 4l-1-1h-5l-1 1H5v2h14V4z"/></svg></button>
      </div>`;
      if (!pl.items.length) { body.innerHTML = exportBtn + `<div class="lib-empty">動画がありません</div>`; return; }
      body.innerHTML = exportBtn + pl.items.map(item => libItemHTML(item, `removePlItem('${plId}','${item.id}')`)).join('');
    }

    window.openCreatePl = function() { document.getElementById('createPlModal').classList.add('open'); document.getElementById('createPlInput').value = ''; setTimeout(()=>document.getElementById('createPlInput').focus(),50);};
    window.closeCreatePl = function() { document.getElementById('createPlModal').classList.remove('open'); };
    window.doCreatePlaylist = function() {
      const name = document.getElementById('createPlInput').value.trim();
      if (!name) return; addPlaylist(name); closeCreatePl(); openDrawer('playlists'); showToast(`再生リスト「${name}」を作成しました`);
    };

    let _ddItem = null;
    window.closePlPicker = function() { document.getElementById('plPickerModal').classList.remove('open'); };
    window.openPlPicker = function(item) {
      _ddItem = item; const pls = getPlaylists(); const list = document.getElementById('plPickerList');
      document.getElementById('plPickerInput').value = '';
      list.innerHTML = pls.length ? pls.map(pl => `<label class="modal-pl-item ripple-wrapper"><input type="checkbox" onchange="plPickerToggle('${pl.id}', this.checked)"> <span>${pl.name}</span></label>`).join('') : '<div style="font-size:14px;color:var(--text-muted);padding:8px 0;">再生リストがありません</div>';
      document.getElementById('plPickerModal').classList.add('open');
    };
    window.plPickerToggle = function(plId, checked) { if(!_ddItem) return; if(checked) addToPlaylist(plId, _ddItem); else window.removePlItem(plId, _ddItem.id); };
    window.plPickerCreate = function() {
      const name = document.getElementById('plPickerInput').value.trim(); if (!name) return;
      const pl = addPlaylist(name); if (_ddItem) addToPlaylist(pl.id, _ddItem);
      showToast('再生リストに追加しました'); closePlPicker();
    };

    const cardDropdown = document.getElementById('cardDropdown');
    document.addEventListener('click', (e) => {
      const btn = e.target.closest('.card-menu-btn');
      if (btn) {
        e.preventDefault(); e.stopPropagation();
        _ddItem = { id: btn.dataset.id, title: btn.dataset.title, channel: btn.dataset.channel };
        const rect = btn.getBoundingClientRect();
        let top = rect.bottom, left = rect.left - 200;
        if (left < 10) left = 10;
        cardDropdown.style.top = top + 'px'; cardDropdown.style.left = left + 'px';
        cardDropdown.classList.add('open'); return;
      }
      cardDropdown.classList.remove('open');
    });
    window.ddAddLiked = function() { if (_ddItem) addLiked(_ddItem); cardDropdown.classList.remove('open'); };
    window.ddShowPlaylistPicker = function() { cardDropdown.classList.remove('open'); if (_ddItem) window.openPlPicker(_ddItem); };

    document.addEventListener('click', (e) => {
      const card = e.target.closest('a.video-card');
      if (card && !e.target.closest('.card-menu-btn')) {
        const btn = card.querySelector('.card-menu-btn');
        if (btn) recordHistory({ id: btn.dataset.id, title: btn.dataset.title, channel: btn.dataset.channel });
      }
    });
  </script>
</body>
</html>
